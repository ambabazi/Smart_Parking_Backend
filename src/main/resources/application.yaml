spring:
  application:
    name: Smart_Parking
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/smartparking}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        generate_statistics: true
        session:
          events:
            log:
              LOG_QUERIES_SLOWER_THAN_MS: 200
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  cache:
    type: simple
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

app:
  redis:
    enabled: false
  frontend:
    url: ${APP_FRONTEND_URL:http://localhost:5173}
  flutterwave:
    public:
      key: ${FLUTTERWAVE_PUBLIC_KEY:}
    secret:
      key: ${FLUTTERWAVE_SECRET_KEY:}
      hash: ${FLUTTERWAVE_SECRET_HASH:}
  performance:
    slow-request-threshold-ms: ${SLOW_REQUEST_THRESHOLD_MS:500}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

jwt:
  secret: ${JWT_SECRET:secret}
  expiration: ${JWT_EXPIRATION:900000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    url: /api-docs
    disable-swagger-default-url: true

server:
  port: ${PORT:8080}

scheduler:
  event-deactivation:
    cron: "0 0 * * * ?"
