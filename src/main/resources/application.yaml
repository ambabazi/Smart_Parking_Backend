spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

app:
  jwt:
    secret: ${JWT_SECRET}
  flutterwave:
    key: ${FLUTTERWAVE_KEY}
    secret: ${FLUTTERWAVE_SECRET}

spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
