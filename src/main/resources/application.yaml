spring:
  application:
    name: Smart_Parking
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    locations: classpath:db/migration
app:
  jwt:
    secret: ${JWT_SECRET}
  flutterwave:
    key: ${FLUTTERWAVE_KEY}
    secret: ${FLUTTERWAVE_SECRET}
