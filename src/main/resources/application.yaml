spring:
  application:
    name: Smart_Parking
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/smartparking}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  task:
    scheduling:
      pool:
        size: 2

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET:secret}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  flutterwave:
    public:
      key: ${FLUTTERWAVE_PUBLIC_KEY:}
    secret:
      key: ${FLUTTERWAVE_SECRET_KEY:}
      hash: ${FLUTTERWAVE_SECRET_HASH:}
    encryption:

      jpa:
        hibernate:
          ddl-auto: validate

      flyway:
        enabled: true
        locations: classpath:db/migration

    jwt:
      secret: ${JWT_SECRET:secret}
      expiration: ${JWT_EXPIRATION:86400000}
    path: /api-docs
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    url: /api-docs
    disable-swagger-default-url: true

server:
  port: 8080

scheduler:
  event-deactivation:
    cron: "0 0 * * * ?"