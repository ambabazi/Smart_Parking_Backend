spring:
  application:
    name: Smart_Parking
  # Google (OAuth2) sign-in is OPT-IN. It activates only when the client credentials
  # below are provided as environment variables (left unset here so the app boots
  # without them). To enable, set on the backend:
  #   SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID=<your-client-id>
  #   SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET=<your-client-secret>
  # The "google" registration id is recognised automatically (scopes openid/profile/email
  # and Google's endpoints are filled in by Spring's CommonOAuth2Provider).
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/smartparking}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        generate_statistics: true
        session:
          events:
            log:
              LOG_QUERIES_SLOWER_THAN_MS: 200
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
    repair-on-migrate: true
  cache:
    type: simple
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

app:
  redis:
    enabled: false
  frontend:
    url: ${APP_FRONTEND_URL:http://localhost:5173}
  auth:
    reset-token-ttl-minutes: ${RESET_TOKEN_TTL_MINUTES:30}
  ussd:
    service-codes: ${USSD_SERVICE_CODES:*384#,*385#,*386#}
  flutterwave:
    public:
      key: ${FLUTTERWAVE_PUBLIC_KEY:}
    secret:
      key: ${FLUTTERWAVE_SECRET_KEY:}
      hash: ${FLUTTERWAVE_SECRET_HASH:}
  performance:
    slow-request-threshold-ms: ${SLOW_REQUEST_THRESHOLD_MS:500}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

jwt:
  secret: ${JWT_SECRET:secret}
  expiration: ${JWT_EXPIRATION:900000}
  # Refresh-token lifetime = the inactivity window. It is a SLIDING window because the
  # token is rotated (re-issued with a fresh TTL) on every /api/auth/refresh, so each
  # use resets the clock. 2 days (172800000 ms) => a user inactive for 2 days is logged
  # out (their next refresh returns 401 and the app must send them to login).
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION:172800000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    url: /api-docs
    disable-swagger-default-url: true

server:
  port: ${PORT:8080}
  # Render (and most PaaS) terminate TLS and forward via a proxy. This makes Spring
  # honour X-Forwarded-* headers so OAuth2 redirect URIs are built as https.
  forward-headers-strategy: framework

scheduler:
  event-deactivation:
    cron: "0 0 * * * ?"
