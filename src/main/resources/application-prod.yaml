spring:
  config:
    activate:
      on-profile: prod

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    # Render DB was migrated with older script checksums; repair aligns history on deploy.
    repair-on-migrate: true
    validate-on-migrate: false

  cache:
    type: simple

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

app:
  redis:
    enabled: ${APP_REDIS_ENABLED:false}

jwt:
  # Render: set JWT_SECRET in the dashboard (render.yaml can auto-generate it).
  # Fallback is only for bootstrapping; replace before real production traffic.
  secret: ${JWT_SECRET:SmartParkingRenderBootstrapSecretKeyMin32Chars!}
  expiration: ${JWT_EXPIRATION:900000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}
