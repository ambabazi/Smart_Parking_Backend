# ============================================
# Smart Parking - application.properties
# All secrets come from .env / Railway env vars
# ============================================

# Server
server.port=${PORT:8080}

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/smart_parking}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
jwt.secret=${JWT_SECRET:dev-secret-change-in-prod-minimum-32-chars}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Africa's Talking
africastalking.username=${AT_USERNAME:sandbox}
africastalking.api-key=${AT_API_KEY:your-sandbox-key}
africastalking.sender-id=${AT_SENDER_ID:SmartPark}
africastalking.environment=${AT_ENV:sandbox}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
management.endpoint.health.show-details=never

# ── Scheduling (event auto-deactivation by BE2)
spring.task.scheduling.pool.size=2
scheduler.event-deactivation.cron=0 0 * * * ?
